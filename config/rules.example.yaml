rules:
  profile: mvp

  universe:
    include_asset_types:
      - stock
    exclude_st: true
    exclude_suspended: true
    listing_age_days_min: null
    daily_amount_min: null
    market_cap_min: null

  factors:
    enabled_groups:
      - momentum
      - liquidity
      - risk
