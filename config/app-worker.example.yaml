app_base_url: http://127.0.0.1:3000
worker_id: local-worker
worker_token_env: APP_API_TOKEN
tushare_token_env: TUSHARE_TOKEN
log_level: info
poll_interval_seconds: 15
holding_price_poll_interval_seconds: 300
worker_status_interval_seconds: 30
daily_bundle_check_interval_seconds: 900
earliest_daily_publish_time: "16:30"
default_factor_run_id:
default_trade_date:
api_paths:
  analysis_claim: /api/worker/analysis-requests/claim
  analysis_result: /api/worker/analysis-requests/{requestId}/result
  daily_bundle_publish: /api/publish/daily-bundles
  holding_watchlist: /api/worker/holding-prices/watchlist
  holding_prices: /api/worker/holding-prices
  worker_status: /api/worker/status
tasks:
  stock_analysis:
    enabled: true
    poll_interval_seconds: 15
  daily_bundle:
    enabled: true
    check_interval_seconds: 900
    earliest_publish_time: "16:30"
    allowed_windows:
      - "16:00-24:00"
      - "00:00-10:00"
    upload_archive_max: 20
  holding_prices:
    enabled: true
    poll_interval_seconds: 300
