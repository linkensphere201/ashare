dataset_id: security_master
dataset_name: Security Master
layer: curated
version: v001
description: Canonical security identity table for stocks, ETFs, and indices.
primary_key:
  - symbol
fields:
  - name: symbol
    type: string
    nullable: false
    primary_key: true
    partition_key: false
    description: Canonical symbol, such as 600519.SH.
  - name: raw_symbol
    type: string
    nullable: true
    primary_key: false
    partition_key: false
    description: Source-native symbol.
  - name: exchange
    type: string
    nullable: true
    primary_key: false
    partition_key: false
    description: Exchange code, such as SH, SZ, or BJ.
  - name: asset_type
    type: string
    nullable: false
    primary_key: false
    partition_key: false
    description: stock, etf, or index.
  - name: name
    type: string
    nullable: true
    primary_key: false
    partition_key: false
    description: Security name.
  - name: market
    type: string
    nullable: true
    primary_key: false
    partition_key: false
    description: Board or market type.
  - name: market_segment
    type: string
    nullable: true
    primary_key: false
    partition_key: false
    description: Standardized market segment, such as sh_main, sz_main, star, chinext, or bj.
  - name: market_segment_name
    type: string
    nullable: true
    primary_key: false
    partition_key: false
    description: Human-readable Chinese market segment name, such as 上证主板, 深市主板, 科创板, 创业板, or 北交所.
  - name: area
    type: string
    nullable: true
    primary_key: false
    partition_key: false
    description: Source-provided issuer region.
  - name: industry
    type: string
    nullable: true
    primary_key: false
    partition_key: false
    description: Source-provided industry classification.
  - name: list_date
    type: date
    nullable: true
    primary_key: false
    partition_key: false
    description: Listing date.
  - name: delist_date
    type: date
    nullable: true
    primary_key: false
    partition_key: false
    description: Delisting date.
  - name: status
    type: string
    nullable: false
    primary_key: false
    partition_key: false
    description: active, delisted, suspended, or unknown.
  - name: source
    type: string
    nullable: false
    primary_key: false
    partition_key: false
    description: Data source.
  - name: source_batch_id
    type: string
    nullable: false
    primary_key: false
    partition_key: false
    description: Raw batch id.
  - name: data_version
    type: string
    nullable: false
    primary_key: false
    partition_key: false
    description: Curated version.
  - name: created_at
    type: datetime
    nullable: false
    primary_key: false
    partition_key: false
    description: Creation timestamp.
