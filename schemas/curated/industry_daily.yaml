  - name: high
    type: double
    nullable: true
    primary_key: false
    partition_key: false
    description: High price.
  - name: low
    type: double
    nullable: true
    primary_key: false
    partition_key: false
    description: Low price.
  - name: close
    type: double
    nullable: true
    primary_key: false
    partition_key: false
    description: Close price.
  - name: pre_close
    type: double
    nullable: true
